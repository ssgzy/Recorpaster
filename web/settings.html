<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="settings.css">
  <title>听写设置</title>
</head>
<body>
  <!-- 顶部：带一点玻璃质感的标题区 -->
  <header id="topbar">
    <div class="title-wrap">
      <h1>听写设置</h1>
      <p id="engine-now" class="muted">当前引擎：—</p>
    </div>
  </header>

  <main>
    <!-- ============ 基础 ============ -->
    <section class="card">
      <div class="card-head">基础</div>

      <div class="row">
        <div class="row-label"><label for="model">模型</label><span class="hint">越大越准、越慢、越占资源</span></div>
        <div class="control">
          <div class="select-wrap">
            <select id="model">
              <option value="tiny">tiny（最快 · 最省）</option>
              <option value="base">base</option>
              <option value="small">small</option>
              <option value="large-v3-turbo">large-v3-turbo（默认 · 最准）</option>
            </select>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="row-label"><label for="min_silence_ms">断句灵敏度</label><span class="hint">小＝更快出字 · 大＝更完整</span></div>
        <div class="control range">
          <input type="range" id="min_silence_ms" min="100" max="1000" step="50">
          <output class="pill-val"><b id="min_silence_ms_val">300</b> ms</output>
        </div>
      </div>

      <div class="row">
        <div class="row-label"><label>输出方式</label></div>
        <div class="control">
          <div class="seg" id="output_mode">
            <button type="button" data-v="paste">上屏（自动粘贴）</button>
            <button type="button" data-v="copy">仅复制</button>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="row-label"><label for="hotkey">热键</label><span class="hint">推荐 F8（布局中立、不与输入冲突）；F6 / F7 也稳</span></div>
        <div class="control col">
          <div class="select-wrap">
            <select id="hotkey">
              <option value="f8">F8（推荐 · 默认）</option>
              <option value="f6">F6</option>
              <option value="f7">F7</option>
              <option value="ctrl_r">右 Ctrl</option>
              <option value="shift_r">右 Shift</option>
              <option value="alt_r">右 Alt（欧洲键盘慎用 · AltGr）</option>
              <option value="alt_l">左 Alt</option>
            </select>
          </div>
          <div class="seg" id="hotkey_mode">
            <button type="button" data-v="hold">长按推杆</button>
            <button type="button" data-v="toggle">按一下切换</button>
          </div>
        </div>
      </div>
    </section>

    <!-- ============ 高级 ============ -->
    <section class="card">
      <div class="card-head collapsible" id="adv-toggle">
        <span>高级</span><span class="chev">›</span>
      </div>
      <div id="adv-body" class="hidden">
        <div class="row">
          <div class="row-label"><label for="engine">引擎</label><span class="hint" id="engine-hint">“自动”：Apple Silicon 用 mlx，其它用 CPU</span></div>
          <div class="control">
            <div class="select-wrap">
              <select id="engine">
                <option value="auto">自动</option>
                <option value="mlx">mlx（Apple GPU）</option>
                <option value="faster-whisper">faster-whisper（CPU）</option>
              </select>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="row-label"><label for="vad_threshold">环境灵敏度</label><span class="hint">嘈杂调高、安静调低</span></div>
          <div class="control range">
            <input type="range" id="vad_threshold" min="0.1" max="0.9" step="0.05">
            <output class="pill-val">阈值 <b id="vad_threshold_val">0.50</b></output>
          </div>
        </div>

        <div class="row">
          <div class="row-label"><label for="quality_mode">质量模式</label><span class="hint">开＝更准更慢 · 关＝速度优先</span></div>
          <div class="control">
            <label class="switch">
              <input type="checkbox" id="quality_mode">
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <span id="status" class="muted"></span>
    <div class="spacer"></div>
    <button type="button" id="cancel" class="ghost">关闭</button>
    <button type="button" id="save" class="primary">保存并应用</button>
  </footer>

  <script src="settings.js"></script>
</body>
</html>
