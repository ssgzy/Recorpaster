name: build-windows

# 自动在 windows-latest 上打 EXE。推 main / 打 tag(v*) / 手动触发都会跑。
on:
  push:
    branches: [ '**' ]     # 任意分支推送都构建（feature 分支也能在 CI 验证打包）
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write   # 打 tag 时把产物挂到 Release 需要写权限

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-win.txt   # 否则 setup-python 找不到 requirements.txt 会直接报错

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-win.txt
          pip install pyinstaller

      # 留存 Windows 上实际解析出的完整闭包（含 pythonnet/clr_loader/pyinstaller 等），
      # 可作为后续提交的权威 lock（requirements-win.txt 只锁了直接 + ABI 关键依赖）。
      - name: Emit resolved lockfile (Windows 完整闭包)
        shell: pwsh
        run: |
          pip freeze | Out-File -Encoding utf8 requirements-win.lock
          Write-Host '----- requirements-win.lock -----'
          Get-Content requirements-win.lock

      - name: Upload lockfile
        uses: actions/upload-artifact@v4
        with:
          name: requirements-win-lock
          path: requirements-win.lock
          if-no-files-found: warn

      - name: Build EXE (PyInstaller · onedir)
        run: pyinstaller --noconfirm --clean Recorpaster-win.spec

      - name: Sanity check (产物存在)
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/Recorpaster/Recorpaster.exe")) {
            Write-Error "未生成 dist/Recorpaster/Recorpaster.exe"; exit 1
          }
          Get-ChildItem dist/Recorpaster | Select-Object -First 20 Name,Length

      # —— ① 启动探针：打破“没人在真 Windows 跑过”的盲区。两段：
      #    (a) 无头 --selftest：导入全部原生依赖 + 跑一帧 Silero onnx → 确定性抓 DLL/ABI 加载崩溃；
      #    (b) 真启动冒烟 ~15s：起 GUI（跳过模型下载）→ 抓 WebView2/CLR/启动期崩溃。
      #    GUI 子系统 EXE 必须用 Start-Process（-Wait 才阻塞、-PassThru 才拿得到退出码）。
      - name: Selftest probe (无头依赖/ABI 自检)
        shell: pwsh
        run: |
          $exe = "dist/Recorpaster/Recorpaster.exe"
          $p = Start-Process -FilePath $exe -ArgumentList '--selftest' -Wait -PassThru
          $code = $p.ExitCode
          Write-Host "selftest 退出码: $code"
          $log = Join-Path $env:APPDATA 'Recorpaster\Recorpaster.log'
          if (Test-Path $log) {
            Write-Host '----- Recorpaster.log 末尾 -----'
            Get-Content $log -Tail 60
          } else {
            Write-Error "未找到启动日志: $log"; exit 1
          }
          if ($code -ne 0) { Write-Error "selftest 退出码非 0（$code）—— 依赖/ABI 加载失败"; exit 1 }
          if (-not (Select-String -Path $log -Pattern 'selftest OK' -Quiet)) {
            Write-Error "日志未包含 'selftest OK'"; exit 1
          }
          Write-Host 'selftest 通过 ✅'

      - name: Launch smoke test (真启动 ~15s，崩溃即失败)
        shell: pwsh
        env:
          RECORPASTER_SMOKE: '1'   # 跳过模型下载，只验证 GUI/托盘/WebView2/热键启动
        run: |
          $exe = "dist/Recorpaster/Recorpaster.exe"
          $p = Start-Process -FilePath $exe -PassThru
          Start-Sleep -Seconds 15
          $log = Join-Path $env:APPDATA 'Recorpaster\Recorpaster.log'
          if ($p.HasExited) {
            $code = $p.ExitCode
            if (Test-Path $log) { Write-Host '----- Recorpaster.log 末尾 -----'; Get-Content $log -Tail 60 }
            Write-Error "EXE 在 15s 内退出（退出码 $code）—— 疑似启动崩溃（WebView2/CLR/音频设备）"
            exit 1
          }
          Write-Host 'EXE 存活 15s，未崩溃 ✅'
          Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue
          Get-Process Recorpaster -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          if (Test-Path $log) { Write-Host '----- Recorpaster.log 末尾 -----'; Get-Content $log -Tail 40 }

      # 一起带上 WebView2 Evergreen 引导器（约 2MB）：clean Win10 无 WebView2 运行时时，
      # 安装器会静默装上；zip 用户也可手动运行。失败不影响 zip 产物（Win11/CI 自带运行时）。
      - name: Bundle WebView2 bootstrapper (optional)
        continue-on-error: true
        shell: pwsh
        run: Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "dist/Recorpaster/MicrosoftEdgeWebview2Setup.exe"

      - name: Package zip
        shell: pwsh
        run: Compress-Archive -Path dist/Recorpaster/* -DestinationPath Recorpaster-windows-x64.zip -Force

      - name: Upload artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: Recorpaster-windows-x64
          path: Recorpaster-windows-x64.zip
          if-no-files-found: error

      # —— 可选：Inno Setup 安装器（失败不影响上面的 zip 产物）——
      - name: Build installer (Inno Setup · optional)
        if: ${{ hashFiles('installer/Recorpaster.iss') != '' }}
        continue-on-error: true
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer/Recorpaster.iss

      - name: Upload artifact (installer)
        if: ${{ hashFiles('installer/Recorpaster.iss') != '' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: Recorpaster-setup
          path: installer/Output/*.exe
          if-no-files-found: ignore

      # —— 打 tag(v*) 时把产物挂到 GitHub Release ——
      - name: Attach to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Recorpaster-windows-x64.zip
            installer/Output/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
